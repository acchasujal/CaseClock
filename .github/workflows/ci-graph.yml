name: CI — Graph Intelligence (Lane 3)

on:
  pull_request:
    branches: [lane3, main]
    paths:
      - 'graph/**'
      - 'backend/app/db/**'

jobs:
  lint-and-test:
    name: Lint + Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Lint (ruff)
        run: python -m ruff check graph/

      - name: Graph tests
        run: python -m pytest graph/tests/ -v --tb=short
