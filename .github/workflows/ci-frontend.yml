name: CI — Frontend (Lane 2)

on:
  pull_request:
    branches: [lane2, main]
    paths:
      - 'frontend/**'
      - 'shared/contracts/**'

jobs:
  lint-and-test:
    name: Lint + Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Lint (ESLint)
        run: npm run lint
        working-directory: frontend

      - name: Type check (tsc)
        run: npm run typecheck
        working-directory: frontend

      - name: Unit tests (Vitest)
        run: npm run test
        working-directory: frontend

      - name: Build check
        run: npm run build
        working-directory: frontend
