name: CI — Integration (Lane 4 / Main)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  integration:
    name: Full Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps
        run: pip install -r backend/requirements.txt

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Backend lint
        run: python -m ruff check backend/ ai/ graph/

      - name: Backend tests (all)
        run: python -m pytest backend/tests/ graph/tests/ ai/tests/ -v --tb=short

      - name: Frontend build
        run: npm run build
        working-directory: frontend

      - name: Contract consistency check
        # Verify that shared/contracts/api.py and shared/contracts/api.ts are in sync
        run: python scripts/verify_contracts.py
        continue-on-error: true  # Remove once verify_contracts.py is implemented
