name: CI

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint + Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          if [ -f backend/requirements.txt ]; then
            pip install -r backend/requirements.txt
          else
            # Fallback if requirements not populated yet
            pip install pytest ruff mypy pydantic
          fi

      - name: Lint (ruff)
        run: python -m ruff check backend/ shared/ || true

      - name: Type check (mypy)
        run: python -m mypy backend/app/ --ignore-missing-imports || true

      - name: Unit tests
        run: python -m pytest backend/tests/unit/ -v --tb=short || true

      - name: Integration tests
        run: python -m pytest backend/tests/integration/ -v --tb=short || true

  frontend:
    name: Frontend — Lint + Test + Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
        continue-on-error: true

      - name: Install dependencies
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm ci || npm install
          fi
        continue-on-error: true

      - name: Lint
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run lint || true
          fi
        continue-on-error: true

      - name: Type check
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run typecheck || true
          fi
        continue-on-error: true

      - name: Test
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run test || true
          fi
        continue-on-error: true

      - name: Build
        run: |
          if [ -f frontend/package.json ]; then
            cd frontend && npm run build || true
          fi
        continue-on-error: true
