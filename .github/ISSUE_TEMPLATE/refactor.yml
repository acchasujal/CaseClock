name: Refactor
description: Code change with no behavior change — must be justified and separated from feature work
labels: ["type/refactor"]
body:
  - type: markdown
    attributes:
      value: |
        Per `EXECUTION_RULES.md` §"Refactoring Rules" — never refactor and add a feature in the same change.
        Refactoring the clock engine or graph schema requires a `DECISION_LOG.md` entry BEFORE this PR.
  - type: dropdown
    id: lane
    attributes:
      label: Owning Lane
      options:
        - Lane 1 — Backend Core
        - Lane 2 — Frontend
        - Lane 3 — Graph Intelligence
        - Lane 4 — AI + Architecture + Integration
    validations:
      required: true
  - type: textarea
    id: why
    attributes:
      label: Why now? What does this unblock?
      description: A refactor with no clear unblocking justification is deferred until after submission.
    validations:
      required: true
  - type: checkboxes
    id: safety
    attributes:
      label: Safety
      options:
        - label: No feature change is bundled into this PR
          required: true
        - label: "If touching clock/escalation/graph schema: DECISION_LOG.md entry exists (link it in the PR)"
        - label: All existing tests still pass
          required: true
